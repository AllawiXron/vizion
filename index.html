<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عجلة الحظ | Vizion.iq</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
      @theme {
        --font-sans: "Cairo", ui-sans-serif, system-ui, sans-serif;
      }
      body {
        background-color: #FFF5F5;
        background-image: radial-gradient(#FFDADA 1px, transparent 1px);
        background-size: 20px 20px;
        color: #2D3748;
        font-family: "Cairo", sans-serif;
      }
      .sticker-shadow { box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.15); }
      .sticker-border { border: 4px solid #000; background-color: #fff; }
      .wheel-container { transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
      @keyframes pointer-bounce {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.2) translateY(-5px); }
      }
      .pointer-hit { animation: pointer-bounce 0.1s ease-in-out; }
      .floating { animation: float 4s ease-in-out infinite; }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-10px) rotate(1deg); }
      }
    </style>
  </head>
  <body class="selection:bg-pink-200">
    <div id="app" class="min-h-screen flex flex-col items-center px-4 py-8 md:py-16">
      
      <div class="w-full max-w-4xl flex justify-between items-center mb-8">
        <div class="bg-white sticker-border px-4 py-1 rounded-full text-sm font-bold sticker-shadow rotate-[1deg]">
          <span class="w-2 h-2 bg-green-500 inline-block rounded-full animate-ping mr-1"></span>
          المتجر مفتوح!
        </div>
        <div id="activePrizeBadge" class="hidden flex items-center gap-2 bg-yellow-400 sticker-border px-4 py-1 rounded-full text-sm font-bold sticker-shadow rotate-[-2deg]">
          <i data-lucide="gift" class="w-4 h-4"></i>
          الجائزة نشطة
        </div>
      </div>

      <header class="text-center mb-12">
        <div class="inline-block bg-white sticker-border sticker-shadow px-8 py-3 rounded-full mb-6 rotate-[3deg] floating">
          <h2 class="text-pink-500 font-bold text-2xl flex items-center gap-3">
            <i data-lucide="sparkles" class="w-6 h-6"></i>
            عجلة الحظ
          </h2>
        </div>
        <h1 class="text-6xl md:text-8xl font-black text-gray-800 tracking-tighter mb-6">
           <span class="text-pink-500 underline decoration-8 decoration-yellow-300">Vizion.iq</span>
        </h1>
      </header>

      <div class="flex flex-col lg:flex-row items-center justify-center gap-12 mb-20 w-full max-w-6xl">
        
        <div id="currentPrizeSection" class="hidden w-full lg:w-1/3 order-2 lg:order-1">
          <div class="bg-white sticker-border sticker-shadow p-8 rounded-[2rem] rotate-[1deg]">
            <h3 class="font-black text-2xl mb-4 text-gray-800 flex items-center gap-2">
              <i data-lucide="award" class="text-yellow-500"></i>
              جائزتك الحالية
            </h3>
            <div class="p-6 rounded-2xl mb-6 text-center border-4 border-dashed border-pink-500">
              <span id="activePrizeText" class="text-3xl font-black text-pink-500"></span>
            </div>
            <div class="flex items-center gap-3 text-gray-600 bg-gray-50 p-3 rounded-xl" dir="ltr">
              <i data-lucide="copy" class="w-5 h-5 cursor-pointer hover:text-pink-500" onclick="copyCode()"></i>
              <code id="prizeCode" class="font-mono font-bold text-lg w-full text-center">---</code>
            </div>
          </div>
        </div>

        <div class="relative order-1 lg:order-2">
          <div class="absolute top-[-30px] left-1/2 -translate-x-1/2 z-30">
            <div class="w-10 h-14 bg-gray-900 sticker-border rounded-b-full shadow-2xl flex items-end justify-center pb-2">
              <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
          </div>

          <div class="relative w-[320px] h-[320px] md:w-[500px] md:h-[500px] rounded-full sticker-border sticker-shadow bg-white p-2 overflow-hidden">
            <canvas id="wheelCanvas" width="1000" height="1000" class="w-full h-full wheel-container"></canvas>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 md:w-24 md:h-24 bg-white sticker-border rounded-full z-20 flex items-center justify-center shadow-2xl">
              <div class="w-8 h-8 md:w-12 md:h-12 bg-pink-500 rounded-full flex items-center justify-center">
                <i data-lucide="star" class="text-white w-4 h-4 md:w-6 md:h-6 fill-current"></i>
              </div>
            </div>
          </div>

          <div class="mt-8 flex flex-col items-center gap-4">
            <button id="spinButton" class="group relative px-16 py-6 rounded-3xl font-black text-3xl sticker-border sticker-shadow transition-all bg-yellow-400 text-gray-800 hover:bg-yellow-300 hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
              <span id="spinButtonText">دور الآن!</span>
            </button>
            
            <div id="timerContainer" class="hidden flex flex-col items-center gap-1">
              <div class="flex items-center gap-2 text-gray-500 font-bold bg-white px-4 py-2 rounded-full border-2 border-gray-100 shadow-sm">
                <i data-lucide="clock" class="w-4 h-4"></i>
                متاح خلال: <span id="countdownText" class="text-pink-500 font-mono">00:00:00</span>
              </div>
            </div>
          </div>
        </div>

        <div class="w-full lg:w-1/3 order-3">
          <div class="bg-white sticker-border sticker-shadow p-8 rounded-[2rem] rotate-[-1deg]">
            <h3 class="font-black text-2xl mb-6 text-pink-500 flex items-center gap-2">
              <i data-lucide="info"></i>
              القواعد
            </h3>
            <ul class="space-y-4 text-gray-600 font-medium">
              <li class="flex gap-2"><span>•</span> مسموح بتدوير العجلة مرة واحدة كل 24 ساعة.</li>
              <li class="flex gap-2"><span>•</span> الجوائز صالحة لطلب 4 مجموعات ستيكرات أو أكثر.</li>
            </ul>
          </div>
        </div>
      </div>

      <div id="prizeModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white sticker-border sticker-shadow p-10 rounded-[3rem] max-w-md w-full text-center scale-75 opacity-0 transition-all duration-500" id="modalContent">
          <h2 class="text-4xl font-black text-gray-800 mb-4">مبروك!</h2>
          <p class="text-gray-500 font-bold mb-6">لقد ربحت:</p>
          <div id="prizeLabel" class="text-4xl font-black mb-8 py-6 px-4 rounded-3xl sticker-border bg-gray-50 shadow-inner"></div>
          <button id="closeModal" class="w-full py-5 bg-gray-900 text-white font-black text-xl rounded-2xl hover:bg-gray-800 sticker-shadow">
            استلام الجائزة
          </button>
        </div>
      </div>
    </div>

    <script>
      const PRIZES = [
        { id: 1, label: 'توصيل مجاني', color: '#FF6B6B', code: 'MAGIC-FREE', weight: 5 }, 
        { id: 2, label: 'توصيل 3الف فقط', color: '#4ECDC4', code: 'MAGIC-3K', weight: 40 },
        { id: 3, label: 'خصم 30%', color: '#FFE66D', code: 'MAGIC-30', weight: 25 },
        { id: 4, label: 'مجموعة مجانية', color: '#FF9F1C', code: 'MAGIC-FREE-SET', weight: 30 },
      ];

      const COOLDOWN_MS = 24 * 60 * 60 * 1000;
      let isSpinning = false;
      let currentRotation = 0;
      let audioCtx = null;

      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const spinButton = document.getElementById('spinButton');
      const spinButtonText = document.getElementById('spinButtonText');
      const timerContainer = document.getElementById('timerContainer');
      const countdownText = document.getElementById('countdownText');
      const prizeModal = document.getElementById('prizeModal');
      const modalContent = document.getElementById('modalContent');
      const prizeLabel = document.getElementById('prizeLabel');
      const closeModal = document.getElementById('closeModal');
      const currentPrizeSection = document.getElementById('currentPrizeSection');
      const activePrizeText = document.getElementById('activePrizeText');
      const activePrizeBadge = document.getElementById('activePrizeBadge');
      const prizeCodeDisplay = document.getElementById('prizeCode');

      function init() {
        lucide.createIcons();
        drawWheel();
        checkCooldown();
        setInterval(checkCooldown, 1000);
      }

      function checkCooldown() {
        const lastSpin = localStorage.getItem('vizion_last_spin');
        const savedPrize = localStorage.getItem('vizion_saved_prize');
        
        if (lastSpin) {
          const remaining = COOLDOWN_MS - (Date.now() - parseInt(lastSpin));
          if (remaining > 0) {
            spinButton.disabled = true;
            spinButton.classList.add('bg-gray-200', 'text-gray-400');
            spinButtonText.innerText = 'تم التدوير';
            timerContainer.classList.remove('hidden');
            
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            countdownText.innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            
            if (savedPrize) displayActivePrize(JSON.parse(savedPrize));
            return;
          }
        }
        
        // If no cooldown or cooldown expired
        spinButton.disabled = false;
        spinButton.classList.remove('bg-gray-200', 'text-gray-400');
        spinButtonText.innerText = 'دور الآن!';
        timerContainer.classList.add('hidden');
      }

      function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

      function playTick() {
        if (!audioCtx) return;
        const pointer = document.querySelector('.absolute.top-\\[-30px\\]');
        pointer.classList.remove('pointer-hit');
        void pointer.offsetWidth;
        pointer.classList.add('pointer-hit');
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
      }

      function drawWheel() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const centerX = rect.width / 2, centerY = rect.height / 2, radius = rect.width / 2 - 10;
        const angleStep = (2 * Math.PI) / PRIZES.length;

        PRIZES.forEach((prize, i) => {
          const startAngle = i * angleStep - Math.PI/2, endAngle = (i + 1) * angleStep - Math.PI/2;
          ctx.beginPath(); ctx.moveTo(centerX, centerY);
          ctx.arc(centerX, centerY, radius, startAngle, endAngle);
          ctx.fillStyle = prize.color; ctx.fill();
          ctx.strokeStyle = '#000'; ctx.lineWidth = 6; ctx.stroke();
          ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(startAngle + angleStep / 2);
          ctx.textAlign = 'right'; ctx.fillStyle = '#000'; ctx.font = '900 24px Cairo';
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
          ctx.strokeText(prize.label, radius - 30, 8); ctx.fillText(prize.label, radius - 30, 8);
          ctx.restore();
        });
      }

      spinButton.addEventListener('click', () => {
        if (isSpinning || spinButton.disabled) return;
        initAudio();
        isSpinning = true;

        const totalWeight = PRIZES.reduce((sum, p) => sum + p.weight, 0);
        let randomRoll = Math.random() * totalWeight, selectedIndex = 0;
        for (let i = 0; i < PRIZES.length; i++) {
          if (randomRoll < PRIZES[i].weight) { selectedIndex = i; break; }
          randomRoll -= PRIZES[i].weight;
        }

        const sliceSize = 360 / PRIZES.length;
        const jitter = (Math.random() * (sliceSize * 0.6)) - (sliceSize * 0.3);
        const targetDegree = (360 - (selectedIndex * sliceSize)) - (sliceSize / 2) + jitter;
        currentRotation += (8 * 360) + (targetDegree - (currentRotation % 360) + 360) % 360;

        canvas.style.transform = `rotate(${currentRotation}deg)`;

        let lastTickAngle = 0;
        const tickInterval = setInterval(() => {
          const style = window.getComputedStyle(canvas);
          const matrix = new WebKitCSSMatrix(style.transform);
          const angle = (Math.atan2(matrix.b, matrix.a) * (180 / Math.PI) + 360) % 360;
          if (Math.floor(angle / sliceSize) !== Math.floor(lastTickAngle / sliceSize)) playTick();
          lastTickAngle = angle;
          if (!isSpinning) clearInterval(tickInterval);
        }, 30);

        setTimeout(() => {
          isSpinning = false;
          const wonPrize = PRIZES[selectedIndex];
          
          // Lock the user out immediately
          localStorage.setItem('vizion_last_spin', Date.now().toString());
          localStorage.setItem('vizion_saved_prize', JSON.stringify(wonPrize));
          
          prizeLabel.innerText = wonPrize.label;
          prizeLabel.style.color = wonPrize.color;
          prizeModal.classList.remove('hidden');
          setTimeout(() => modalContent.classList.remove('scale-75', 'opacity-0'), 10);
          
          displayActivePrize(wonPrize);
          confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
          checkCooldown();
        }, 5000);
      });

      function displayActivePrize(prize) {
        currentPrizeSection.classList.remove('hidden');
        activePrizeBadge.classList.remove('hidden');
        activePrizeText.innerText = prize.label;
        prizeCodeDisplay.innerText = prize.code;
      }

      function copyCode() {
        navigator.clipboard.writeText(prizeCodeDisplay.innerText).then(() => {
          const original = prizeCodeDisplay.innerText;
          prizeCodeDisplay.innerText = 'تم النسخ!';
          setTimeout(() => prizeCodeDisplay.innerText = original, 2000);
        });
      }

      closeModal.addEventListener('click', () => {
        modalContent.classList.add('scale-75', 'opacity-0');
        setTimeout(() => prizeModal.classList.add('hidden'), 500);
      });

      window.addEventListener('resize', drawWheel);
      init();
    </script>
  </body>
</html>
